# pcmanfm profile for CU agent virtual desktops (M2, 2026-07-23). Seeded per
# session into /tmp/cu-agent-xdg-<slot>/pcmanfm/cu-agent/pcmanfm.conf by
# display.py:_seed_xdg_config.
#
# show_wm_menu=1 is THE load-bearing line: without it pcmanfm --desktop
# swallows desktop right-clicks with its own file menu (Select All / Sort
# Files...) and the openbox Applications menu is unreachable — the agent has
# no way to launch apps from the desktop (smoke-test find, 2026-07-23).
[config]
bm_open_method=0

[desktop]
wallpaper_mode=color
desktop_bg=#1a1a22
desktop_fg=#dddddd
desktop_shadow=#000000
show_wm_menu=1
show_documents=0
show_trash=0
show_mounts=0

[ui]
always_show_tabs=0
win_width=900
win_height=600
view_mode=icon
show_hidden=0
sort=name;ascending;
