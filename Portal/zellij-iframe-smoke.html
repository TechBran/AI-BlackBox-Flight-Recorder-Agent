<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>T11c smoke test — Zellij iframe module</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #111; color: #eee; }
    header { padding: 12px 16px; background: #222; border-bottom: 1px solid #333; }
    header h1 { margin: 0; font-size: 14px; font-weight: normal; }
    header span { color: #888; font-size: 12px; }
    #controls { padding: 8px 16px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; gap: 8px; align-items: center; }
    button { padding: 6px 12px; background: #2a2a2a; color: #eee; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-family: inherit; }
    button:hover { background: #333; }
    #status { color: #888; font-size: 12px; margin-left: auto; }
    #host { position: relative; height: calc(100vh - 92px); background: #000; }
    .zellij-iframe { width: 100%; height: 100%; border: 0; display: block; }
    .zellij-iframe-loading, .zellij-iframe-error {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.85); color: #eee; font-size: 14px;
    }
    .zellij-iframe-error { color: #f88; cursor: pointer; }
    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <header>
    <h1>T11c smoke test — Zellij iframe module
      <span> · drives <code>Portal/modules/cli-agents-zellij-iframe.js</code> against a live Zellij session</span>
    </h1>
  </header>
  <div id="controls">
    <button id="btnLaunch">1. Launch terminal session</button>
    <button id="btnUnload" disabled>2. Unload session</button>
    <button id="btnRelaunch" disabled>3. Re-launch (test switcher swap)</button>
    <button id="btnCleanup">Cleanup (DELETE session)</button>
    <span id="status">idle</span>
  </div>
  <div id="host"></div>

  <script type="module">
    import {
      mountIframe, loadSession, unloadSession,
      getCurrentSessionName, unmountIframe
    } from '/ui/modules/cli-agents-zellij-iframe.js';

    const host = document.getElementById('host');
    const status = document.getElementById('status');
    const btnLaunch = document.getElementById('btnLaunch');
    const btnUnload = document.getElementById('btnUnload');
    const btnRelaunch = document.getElementById('btnRelaunch');
    const btnCleanup = document.getElementById('btnCleanup');

    let lastSessionName = null;

    mountIframe(host, {
      onSessionLoad: ({ sessionName }) => {
        status.textContent = `loaded: ${sessionName}`;
        btnUnload.disabled = false;
        btnRelaunch.disabled = false;
      },
      onSessionError: ({ sessionName, reason }) => {
        status.textContent = `error on ${sessionName}: ${reason}`;
      },
    });

    async function launchSession() {
      status.textContent = 'minting session…';
      const resp = await fetch('/cli-agent/zellij/launch?op=Brandon', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ provider: 'terminal' }),
      });
      if (!resp.ok) { status.textContent = `launch failed: ${resp.status}`; return; }
      const data = await resp.json();
      lastSessionName = data.session_name;

      // Zellij auth bridge: POST /command/login from the parent frame to set
      // the session_token cookie on our origin. Then the iframe load auto-
      // includes it (same-origin, Path=/, SameSite=Strict allows same-site).
      status.textContent = 'authenticating…';
      const login = await fetch('/app-proxy/9097/command/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ auth_token: data.token, remember_me: false }),
      });
      if (!login.ok) { status.textContent = `login failed: ${login.status}`; return; }

      status.textContent = 'loading iframe…';
      loadSession({
        sessionUrl: data.session_url,
        sessionName: data.session_name,
        onLoad: () => console.log('[smoke] onLoad fired for', data.session_name),
        onError: (e) => console.error('[smoke] onError fired', e),
      });
    }

    btnLaunch.onclick = launchSession;
    btnRelaunch.onclick = async () => {
      if (lastSessionName) {
        await fetch(
          `/cli-agent/zellij/sessions/${encodeURIComponent(lastSessionName)}?op=Brandon`,
          { method: 'DELETE' },
        );
        unloadSession();
      }
      launchSession();
    };
    btnUnload.onclick = () => {
      unloadSession();
      status.textContent = `unloaded (current=${getCurrentSessionName()})`;
      btnUnload.disabled = true;
    };
    btnCleanup.onclick = async () => {
      if (!lastSessionName) { status.textContent = 'no session to clean'; return; }
      const resp = await fetch(
        `/cli-agent/zellij/sessions/${encodeURIComponent(lastSessionName)}?op=Brandon`,
        { method: 'DELETE' },
      );
      status.textContent = resp.ok ? `cleaned ${lastSessionName}` : `cleanup failed: ${resp.status}`;
      unloadSession();
      lastSessionName = null;
      btnUnload.disabled = true;
      btnRelaunch.disabled = true;
    };
  </script>
</body>
</html>
