[pytest]
# Pytest configuration (T1 / audit I1).
# Tests live under Orchestrator/tests/ (the existing location pre-dates this
# config but was never discoverable without explicit -p arguments).
testpaths = Orchestrator/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .
# Custom markers.
markers =
    real_fetchers: opt out of the hermetic patch_hf_fetchers autouse fixture so the test exercises the REAL _fetch_hf_models/_fetch_hf_tree (with only _http_get_json patched).
    probe_live: LIVE WS probe against a provider realtime endpoint (network + paid API calls; run explicitly with `pytest diagnostics/voice_probes -m probe_live` — never in CI/default suite).
# Filter out known noisy warnings from deps that we don't control.
filterwarnings =
    ignore::DeprecationWarning:google.*
    ignore::DeprecationWarning:apscheduler.*
